services:
  - type: web
    name: poke-mail
    runtime: docker
    plan: free
    autoDeploy: false
    envVars:
      - key: MCP_API_KEY
        generateValue: true
      - key: POKE_WEBHOOK_URL
        sync: false
      - key: POKE_API_KEY
        sync: false
      - key: IMAP_HOST
        sync: false
      - key: IMAP_USERNAME
        sync: false
      - key: IMAP_PASSWORD
        sync: false
